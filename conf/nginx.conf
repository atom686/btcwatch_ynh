#sub_path_only rewrite ^__PATH__$ __PATH__/ permanent;
location __PATH__/ {

  alias __INSTALL_DIR__/public/;

  index index.php;
  try_files $uri $uri/ __PATH__/index.php?$query_string;

  location ~ [^/]\.php(/|$) {
    fastcgi_split_path_info ^(.+?\.php)(/.*)$;
    fastcgi_pass unix:/var/run/php/php__PHPVERSION__-fpm-__APP__.sock;

    fastcgi_index index.php;
    include fastcgi_params;
    fastcgi_param REMOTE_USER     $remote_user;
    fastcgi_param PATH_INFO       $fastcgi_path_info;
    fastcgi_param SCRIPT_FILENAME $request_filename;
    fastcgi_param HTTP_PROXY      "";

    client_max_body_size 4M;
    fastcgi_read_timeout 60s;
  }

  # Defence in depth: in case the alias path leaks, refuse direct
  # access to library / view files anyway.
  location ~* /(lib|views)/ {
    deny all;
    return 404;
  }

  include conf.d/yunohost_panel.conf.inc;
}
