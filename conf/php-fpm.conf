[__APP__]

user = __APP__
group = __APP__

chdir = __INSTALL_DIR__

listen = /var/run/php/php__PHPVERSION__-fpm-__APP__.sock
listen.owner = www-data
listen.group = www-data

pm = ondemand
pm.max_children = 5
pm.process_idle_timeout = 10s
pm.max_requests = 500

; PHP doesn't read EnvironmentFile from systemd; we keep secrets in
; settings.json (managed by the web UI) and runtime config in config.php.
; Only paths that the lib code needs are passed through env, so they
; can be overridden without touching code.
env[ADDRESSES_PATH] = "__DATA_DIR__/addresses.json"
env[SETTINGS_PATH]  = "__DATA_DIR__/settings.json"

; Helpful for tracking down errors during install. Logs go to syslog;
; view via:  journalctl -t php__PHPVERSION__-fpm SYSLOG_IDENTIFIER=php-fpm__PHPVERSION__
catch_workers_output = yes
php_admin_value[error_log] = /var/log/__APP__/error.log
php_admin_flag[log_errors] = on
php_admin_value[max_execution_time] = 60
php_admin_value[memory_limit]       = 64M
