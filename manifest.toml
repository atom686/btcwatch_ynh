#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "btcwatch"
name = "Bitcoin Address Watch"
description.en = "Monitor Bitcoin addresses via mempool.space and get a Telegram notification on every balance change."
description.fr = "Surveille des adresses Bitcoin via mempool.space et envoie une notification Telegram à chaque changement de solde."

version = "0.2.0~ynh1"

maintainers = ["Igor <is@svrgn.me>"]

[upstream]
license = "MIT"
website = "https://github.com/atom686/btcwatch_ynh"
code = "https://github.com/atom686/btcwatch_ynh"
admindoc = "https://github.com/atom686/btcwatch_ynh#readme"

[integration]
yunohost = ">= 11.2"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = "not_relevant"
sso = true

disk = "20M"
ram.build = "50M"
ram.runtime = "50M"

# ---------------------------------------------------------------------------
# Install-time questions
# ---------------------------------------------------------------------------
[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/btcwatch"

    [install.init_main_permission]
    type = "group"
    default = "all_users"
    help.en = "Who can reach the web UI? Defaults to all YunoHost users (SSO-protected)."

    [install.telegram_bot_token]
    type = "string"
    ask.en = "Telegram bot token (optional)"
    help.en = "Talk to @BotFather on Telegram, run /newbot, paste the HTTP API token here. You can set or change this later from the web UI."
    example = "123456:AAH..."
    optional = true

    [install.telegram_chat_id]
    type = "string"
    ask.en = "Telegram chat id (optional)"
    help.en = "Send any message to your bot, then visit https://api.telegram.org/bot<TOKEN>/getUpdates and copy the chat.id value. You can set this later from the web UI."
    example = "987654321"
    optional = true

# ---------------------------------------------------------------------------
# Resources YunoHost provisions for us
# ---------------------------------------------------------------------------
[resources]

    [resources.system_user]
    # Creates the unprivileged `btcwatch` system user (used by PHP-FPM pool + cron).

    [resources.install_dir]
    # Provisions /var/www/btcwatch.

    [resources.data_dir]
    # Provisions /home/yunohost.app/btcwatch — holds addresses.json + settings.json
    # so user state survives upgrades.

    [resources.permissions]
    main.url = "/"
    # SSO is forced on by integration.sso = true + init_main_permission.

    [resources.apt]
    packages = "php8.2-fpm, php8.2-curl"
